<!DOCTYPE html>
<html>
<head>
    <title>Editar Produto</title>
</head>
<body>
    <h1>Editar Produto</h1>

    <form method="POST">
        <label>Nome:</label>
        <input type="text" name="nome" value="{{ produto[1] }}" required>

        <br><br>

        <label>Preço:</label>
        <input type="number" step="0.01" min="0.01" name="preco" value="{{ produto[2] }}" required>

        <br><br>

        <label>Estoque:</label>
        <input type="number" min="0" name="estoque" value="{{ produto[3] }}" required>

        <br><br>

        <button type="submit">Salvar alterações</button>
    </form>

    <br>

    <a href="/produtos">Voltar</a>
</body>
</html>
