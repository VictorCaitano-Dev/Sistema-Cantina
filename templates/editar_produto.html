{% extends "base.html" %}

{% block titulo %}Editar Produto{% endblock %}

{% block conteudo %}

    <div class="cartao">
        <h2 class="cartao-titulo">Editar Produto</h2>

        <form method="POST">
            <div class="campo">
                <label>Nome:</label>
                <input type="text" name="nome" value="{{ produto[1] }}" required>
            </div>

            <div class="campo">
                <label>Preço:</label>
                <input type="number" step="0.01" min="0.01" name="preco" value="{{ produto[2] }}" required>
            </div>

            <div class="campo">
                <label>Estoque:</label>
                <input type="number" min="0" name="estoque" value="{{ produto[3] }}" required>
            </div>

            <button type="submit">Salvar alterações</button>
        </form>
    </div>

    <div class="links-rodape-pagina">
        <a href="/produtos">Voltar</a>
    </div>

{% endblock %}
